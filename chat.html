<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StayManager AI</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />

    <style>
      body {
        font-family: Inter, sans-serif;
        background: #e2e8f0;
      }

      :root {
        --primary: #0f172a;
        --accent: #ca8a04;
        --light: #f8fafc;
        --text: #334155;
      }

      /* Floating Button */

      .chat-toggle {
        position: fixed;
        bottom: 25px;
        right: 25px;
        width: 65px;
        height: 65px;
        border-radius: 50%;
        background: var(--primary);
        color: white;
        border: none;
        cursor: pointer;
        box-shadow: 0 15px 30px rgba(0, 0, 0, 0.3);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 1000;
        animation: float 3s ease-in-out infinite;
      }

      .chat-toggle:hover {
        transform: scale(1.08);
      }

      @keyframes float {
        0% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-6px);
        }
        100% {
          transform: translateY(0);
        }
      }

      /* Chat Container */

      .chat-container {
        position: fixed;
        bottom: 110px;
        right: 25px;

        width: 380px;
        height: 600px;

        backdrop-filter: blur(16px);
        background: rgba(255, 255, 255, 0.85);

        border-radius: 18px;

        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.2);

        display: flex;
        flex-direction: column;

        overflow: hidden;

        opacity: 0;
        transform: translateY(30px) scale(0.92);
        pointer-events: none;

        transition: 0.35s ease;
      }

      .chat-container.active {
        opacity: 1;
        transform: translateY(0) scale(1);
        pointer-events: all;
      }

      /* Header */

      .chat-header {
        background: var(--primary);
        color: white;
        padding: 16px 18px;

        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .header-left {
        display: flex;
        gap: 10px;
        align-items: center;
      }

      .avatar {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        background: var(--accent);
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 600;
      }

      .header-text h3 {
        margin: 0;
        font-size: 15px;
      }

      .header-text p {
        margin: 2px 0 0;
        font-size: 12px;
        color: #cbd5f5;
      }

      .close-btn {
        border: none;
        background: transparent;
        color: #cbd5f5;
        font-size: 22px;
        cursor: pointer;
      }

      /* Chat Window */

      .chat-window {
        flex: 1;
        padding: 18px;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 14px;
      }

      /* Message */

      .msg-wrapper {
        display: flex;
        gap: 8px;
        align-items: flex-end;
      }

      .msg-wrapper.user {
        flex-direction: row-reverse;
      }

      .avatar-sm {
        width: 26px;
        height: 26px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 12px;
        font-weight: 600;
        color: white;
      }

      .avatar-bot {
        background: var(--accent);
      }
      .avatar-user {
        background: var(--primary);
      }

      .message {
        padding: 12px 16px;
        font-size: 14px;
        line-height: 1.5;

        border-radius: 16px;

        max-width: 75%;

        animation: fadeIn 0.25s ease;
      }

      .message.bot {
        background: white;
        border: 1px solid #e2e8f0;
      }

      .message.user {
        background: var(--primary);
        color: white;
      }

      .message:hover {
        transform: scale(1.02);
      }

      .time {
        font-size: 10px;
        margin-top: 6px;
        opacity: 0.6;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
        }
      }

      /* Quick actions */

      .quick-actions {
        display: flex;
        gap: 8px;
        padding: 10px 15px;
        overflow-x: auto;
      }

      .chip {
        background: linear-gradient(135deg, #ffffff, #f1f5f9);
        border: 1px solid #e2e8f0;

        padding: 7px 13px;

        border-radius: 20px;

        font-size: 12px;
        cursor: pointer;

        transition: 0.25s ease;

        white-space: nowrap;
      }

      .chip:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 12px rgba(0, 0, 0, 0.15);
      }

      /* Input */

      .chat-input {
        display: flex;
        padding: 14px;
        gap: 10px;
        border-top: 1px solid #e2e8f0;
        background: white;
      }

      .chat-input input {
        flex: 1;
        padding: 11px 14px;

        border-radius: 22px;

        border: 1px solid #cbd5e1;

        outline: none;

        font-size: 14px;
      }

      .chat-input input:focus {
        border-color: var(--primary);
      }

      #send-btn {
        width: 40px;
        height: 40px;

        border-radius: 50%;

        border: none;

        background: var(--primary);
        color: white;

        cursor: pointer;

        display: flex;
        align-items: center;
        justify-content: center;

        transition: 0.2s;
      }

      #send-btn:active {
        transform: scale(0.9);
      }

      #send-btn:hover {
        background: var(--accent);
      }

      /* Typing */

      .typing {
        display: flex;
        gap: 5px;
        padding: 12px 14px;
        background: white;
        border-radius: 14px;
        width: fit-content;
        border: 1px solid #e2e8f0;
      }

      .dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: #94a3b8;
        animation: typing 1.2s infinite;
      }

      .dot:nth-child(2) {
        animation-delay: 0.2s;
      }
      .dot:nth-child(3) {
        animation-delay: 0.4s;
      }

      @keyframes typing {
        0% {
          opacity: 0.3;
          transform: translateY(0);
        }
        50% {
          opacity: 1;
          transform: translateY(-4px);
        }
        100% {
          opacity: 0.3;
          transform: translateY(0);
        }
      }
    </style>
  </head>

  <body>
    <button id="chat-toggle" class="chat-toggle">💬</button>

    <div id="chat-container" class="chat-container">
      <div class="chat-header">
        <div class="header-left">
          <div class="avatar">AI</div>
          <div class="header-text">
            <h3>StayManager Agent</h3>
            <p>Hotel Operations Assistant</p>
          </div>
        </div>

        <button id="close-chat" class="close-btn">×</button>
      </div>

      <div id="chat-window" class="chat-window"></div>

      <div id="typing" style="display: none; padding-left: 18px">
        <div class="typing">
          <div class="dot"></div>
          <div class="dot"></div>
          <div class="dot"></div>
        </div>
      </div>

      <div class="quick-actions">
        <button
          class="chip"
          onclick="quick('Show available rooms for tonight')"
        >
          Inventory
        </button>
        <button class="chip" onclick="quick('Weekly booking insights')">
          Insights
        </button>
        <button class="chip" onclick="quick('Flag pending payments')">
          Payments
        </button>
      </div>

      <div class="chat-input">
        <input id="user-input" placeholder="Ask about bookings, rooms..." />

        <button id="send-btn">➤</button>
      </div>
    </div>

    <script>
      const toggle = document.getElementById("chat-toggle");
      const container = document.getElementById("chat-container");
      const close = document.getElementById("close-chat");

      const sendBtn = document.getElementById("send-btn");
      const input = document.getElementById("user-input");

      const chat = document.getElementById("chat-window");
      const typing = document.getElementById("typing");

      const sessionId = "stay-" + Math.random().toString(36).substring(2, 9);

      toggle.onclick = () => container.classList.add("active");
      close.onclick = () => container.classList.remove("active");

      function time() {
        const d = new Date();
        return d.getHours() + ":" + String(d.getMinutes()).padStart(2, "0");
      }

      function addMessage(text, sender) {
        const wrap = document.createElement("div");
        wrap.classList.add("msg-wrapper", sender);

        const avatar = document.createElement("div");
        avatar.classList.add("avatar-sm");

        avatar.classList.add(sender === "bot" ? "avatar-bot" : "avatar-user");
        avatar.innerText = sender === "bot" ? "AI" : "U";

        const msg = document.createElement("div");
        msg.classList.add("message", sender);
        msg.innerText = text;

        const t = document.createElement("div");
        t.classList.add("time");
        t.innerText = time();

        msg.appendChild(t);

        wrap.appendChild(avatar);
        wrap.appendChild(msg);

        chat.appendChild(wrap);

        scroll();
      }

      function scroll() {
        chat.scrollTo({
          top: chat.scrollHeight,
          behavior: "smooth",
        });
      }

      function quick(text) {
        getBotResponse(text);
      }

      async function getBotResponse(text) {
        if (!text.trim()) return;

        addMessage(text, "user");
        input.value = "";

        typing.style.display = "block";

        try {
          const res = await fetch("http://127.0.0.1:8000/chat", {
            method: "POST",

            headers: {
              "Content-Type": "application/json",
            },

            body: JSON.stringify({
              session_id: sessionId,
              message: text,
            }),
          });

          const data = await res.json();

          typing.style.display = "none";

          const reply = extract(data);

          addMessage(reply, "bot");
        } catch (e) {
          typing.style.display = "none";

          addMessage("Unable to connect to StayManager AI", "bot");
        }
      }

      function extract(data) {
        if (typeof data === "string") return data;

        if (data.reply) return data.reply;

        if (data.message) return data.message;

        if (data.response) return data.response;

        if (data.content && Array.isArray(data.content)) {
          return data.content
            .filter((x) => x.text)
            .map((x) => x.text)
            .join("\n");
        }

        return "Response received.";
      }

      sendBtn.onclick = () => getBotResponse(input.value);

      input.addEventListener("keypress", (e) => {
        if (e.key === "Enter") {
          getBotResponse(input.value);
        }
      });

      /* Welcome message */

      setTimeout(() => {
        addMessage(
          "Hello! I can help with hotel inventory, bookings, and analytics.",
          "bot"
        );
      }, 500);
    </script>
  </body>
</html>
