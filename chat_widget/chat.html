<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StayManager AI</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link rel="stylesheet" href="chat.css">

</head>

<body>
  <div class="demo-bg"></div>

  <!-- Toggle Button -->
  <button id="chat-toggle" class="chat-toggle" title="Open StayManager AI">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
    </svg>
  </button>

  <!-- Widget -->
  <div id="chat-container" class="chat-container">

    <!-- Header -->
    <div class="chat-header">
      <div class="header-left">
        <div class="header-avatar">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>
          </svg>
          <div class="online-dot"></div>
        </div>
        <div class="header-info">
          <h3>StayManager AI</h3>
          <p>Property &amp; Booking Assistant</p>
        </div>
      </div>
      <div class="header-actions">
        <button class="icon-btn" title="Clear chat" id="clear-btn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.87"/>
          </svg>
        </button>
        <button class="icon-btn" title="Expand to fullscreen" id="expand-btn">
          <!-- Expand icon (default) -->
          <span class="fs-icon-expand" style="display:flex;align-items:center;justify-content:center;">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/>
              <line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/>
            </svg>
          </span>
          <!-- Shrink icon (fullscreen) -->
          <span class="fs-icon-shrink" style="align-items:center;justify-content:center;">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="4 14 10 14 10 20"/><polyline points="20 10 14 10 14 4"/>
              <line x1="10" y1="14" x2="3" y2="21"/><line x1="21" y1="3" x2="14" y2="10"/>
            </svg>
          </span>
        </button>
        <button class="icon-btn close-btn-new" id="close-btn" title="Close">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- Messages -->
    <div id="chat-window" class="chat-window">
      <div class="date-divider">Today</div>
    </div>

    <!-- Typing Indicator -->
    <div id="typing" class="typing-wrap">
      <div class="typing-avatar">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#c9a86c" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
      </div>
      <div class="typing-dots"><span></span><span></span><span></span></div>
    </div>

    <!-- Quick Actions Panel -->
    <div class="quick-panel">
      <div class="quick-tabs">
        <button class="qtab active" data-tab="discover">🔍 Discover</button>
        <button class="qtab" data-tab="rooms">🛏️ Rooms</button>
        <button class="qtab" data-tab="bookings">📋 Bookings</button>
      </div>

      <!-- Discover tab -->
      <div class="quick-pane active" id="pane-discover">
        <button class="chip" onclick="quick('Search for hotels in New York')"><span class="chip-icon">🏨</span> Find Hotels</button>
        <button class="chip" onclick="quick('Compare top hotels for me')"><span class="chip-icon">⚖️</span> Compare Hotels</button>
        <button class="chip" onclick="quick('Give me AI hotel recommendations')"><span class="chip-icon">✨</span> AI Picks</button>
        <button class="chip" onclick="quick('Show me hotel details')"><span class="chip-icon">ℹ️</span> Hotel Info</button>
      </div>

      <!-- Rooms tab -->
      <div class="quick-pane" id="pane-rooms">
        <button class="chip" onclick="quick('Check room availability')"><span class="chip-icon">🗓️</span> Check Availability</button>
        <button class="chip" onclick="quick('Show me room details and pricing')"><span class="chip-icon">🔑</span> Room Details</button>
        <button class="chip" onclick="quick('What room types are available?')"><span class="chip-icon">🏷️</span> Room Types</button>
      </div>

      <!-- Bookings tab -->
      <div class="quick-pane" id="pane-bookings">
        <button class="chip" onclick="quick('I want to book a room')"><span class="chip-icon">✅</span> Book a Room</button>
        <button class="chip" onclick="quick('Cancel my booking')"><span class="chip-icon">❌</span> Cancel Booking</button>
        <button class="chip" onclick="quick('Show my booking details')"><span class="chip-icon">📄</span> My Bookings</button>
      </div>
    </div>

    <!-- Input -->
    <div class="chat-input-wrap">
      <div class="input-row">
        <input
          id="user-input"
          class="chat-input"
          placeholder="Search hotels, check availability, book rooms…"
          autocomplete="off"
        />
        <button class="send-btn" id="send-btn" title="Send">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
    </div>

  </div>

<script src="chat.js"></script>


</body>
</html>
